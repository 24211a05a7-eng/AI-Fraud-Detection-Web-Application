services:
  # 1. FastAPI Python Backend Web Service (100% FREE)
  - type: web
    name: fraud-detection-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install --only-binary :all: -r requirements.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        # Runs SQLite locally inside the container (completely free, no paid disk needed)
        value: sqlite:///./fraud_detection_inr.db
      - key: PYTHON_VERSION
        value: 3.11.5

  # 2. React Static Frontend Site (100% FREE)
  - type: web
    name: fraud-detection-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://${fraud-detection-backend.host}/api
      - key: VITE_WS_URL
        value: wss://${fraud-detection-backend.host}/api/stream/ws
