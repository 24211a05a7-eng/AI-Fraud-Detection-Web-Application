services:
  # 1. FastAPI Python Backend Web Service
  - type: web
    name: fraud-detection-backend
    runtime: python
    rootDir: backend
    # Force binary wheels to speed up build and prevent compiler dependency failures
    buildCommand: "pip install --only-binary :all: -r requirements.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        # Stores the SQLite DB on a persistent disk mount so data is not wiped out between deploys
        value: sqlite:////data/fraud_detection_inr.db
      - key: PYTHON_VERSION
        value: 3.11.5
    disk:
      name: backend-db-disk
      mountPath: /data
      sizeGB: 1

  # 2. React Static Frontend Site
  - type: web
    name: fraud-detection-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Automatically resolves to the backend service's public domain URL
        value: https://${fraud-detection-backend.host}/api
      - key: VITE_WS_URL
        # Automatically resolves to the backend service's public websocket URL
        value: wss://${fraud-detection-backend.host}/api/stream/ws
